<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#16181c;--bg3:#1e2026;--border:#2a2d35;
  --text:#e8eaf0;--muted:#6b7280;--muted2:#9ca3af;
  --champ:#f59e0b;--cl-direct:#3b82f6;--cl-pre:#60a5fa;
  --el-direct:#10b981;--el-pre:#34d399;--conf:#a78bfa;
  --rel-direct:#ef4444;--rel-playoff:#f97316;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── HEADER ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;border-bottom:1px solid var(--border)}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;text-decoration:none;color:var(--text)}
.logo span{color:var(--champ)}
.logo small{font-size:12px;font-weight:600;color:var(--muted2);font-family:'Inter',sans-serif;margin-left:3px;vertical-align:middle}
.header-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;align-items:center}
.live-dot{width:6px;height:6px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── NAV / LEAGUE FILTER ── */
.filters{display:flex;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.filters::-webkit-scrollbar{display:none}
.filter-btn{font-size:12px;font-weight:500;background:none;border:none;color:var(--muted2);padding:10px 12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{color:var(--text);border-bottom-color:var(--champ)}

/* ── SECONDARY FILTERS (zender) ── */
.sec-filters{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sec-label{font-size:10px;color:var(--muted);margin-right:2px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
.tag-btn{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tag-btn:hover,.tag-btn.active{background:var(--bg3);color:var(--text);border-color:var(--muted)}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted2);cursor:pointer;padding:3px 7px;border-radius:4px;border:1px solid transparent;transition:all .15s}
.leg-item:hover{border-color:var(--border);background:var(--bg3)}
.leg-item.active{border-color:var(--muted);background:var(--bg3);color:var(--text)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── STATS BAR ── */
.stats-bar{display:flex;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-block{display:flex;flex-direction:column;justify-content:center;padding:9px 14px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.stat-block:last-child{border-right:none}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px}
.stat-value{font-size:17px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;line-height:1}
.stat-block.s-free .stat-value{color:#10b981}
.stat-block.s-paid .stat-value{color:var(--muted2)}
.stat-block.zender{cursor:pointer;transition:background .15s}
.stat-block.zender:hover{background:var(--bg3)}
.stat-block.zender.active{background:var(--bg3);border-bottom:2px solid var(--champ)}
.stat-block.zender .stat-value,.zender-name{color:var(--muted2)}
.stat-block.zender.active .stat-value,.stat-block.zender.active .zender-name{color:var(--text)}
.zender-name{font-size:10px;font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em}

/* ── MAIN CONTENT ── */
.main{padding:14px 16px;max-width:1100px;margin:0 auto}

/* Day separator */
.day-sep{display:flex;align-items:center;gap:10px;padding:18px 0 8px}
.day-sep:first-child{padding-top:6px}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);white-space:nowrap}
.day-line{flex:1;height:1px;background:var(--border)}
.day-count2{font-size:11px;font-family:'Inter',sans-serif;background:var(--bg3);padding:2px 7px;border-radius:10px;color:var(--muted);white-space:nowrap}

/* Match row */
.match-row{display:grid;grid-template-columns:52px 1fr 90px;align-items:center;gap:12px;padding:9px 12px;border-radius:7px;margin-bottom:3px;background:var(--bg2);border:1px solid var(--border);transition:border-color .15s}
.match-row:hover{border-color:#3a3d47}
.m-time{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.m-teams{display:flex;flex-direction:column;gap:3px}
.m-comp{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:2px}
.team-line{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.team-rank{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);min-width:20px;flex-shrink:0}
.team-name{font-weight:600;font-size:13px}
.vs-row{font-size:10px;color:var(--muted);padding-left:26px}
.stake-badge{font-size:9px;font-weight:600;letter-spacing:0.04em;padding:2px 6px;border-radius:3px;white-space:nowrap}
.b-champ    {background:#f59e0b22;color:var(--champ);    border:1px solid #f59e0b44}
.b-cl-direct{background:#3b82f622;color:var(--cl-direct);border:1px solid #3b82f644}
.b-cl-pre   {background:#60a5fa18;color:var(--cl-pre);   border:1px solid #60a5fa35}
.b-el-direct{background:#10b98122;color:var(--el-direct);border:1px solid #10b98144}
.b-el-pre   {background:#34d39918;color:var(--el-pre);   border:1px solid #34d39935}
.b-conf     {background:#a78bfa18;color:var(--conf);     border:1px solid #a78bfa35}
.b-rel-dir  {background:#ef444422;color:var(--rel-direct);border:1px solid #ef444444}
.b-rel-po   {background:#f9741622;color:var(--rel-playoff);border:1px solid #f9741644}

/* TV badges */
.tv-logo{font-size:10px;font-weight:600;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);white-space:nowrap;display:inline-block;text-align:center;width:100%}
.tv-logo.viaplay{border-color:#6366f150;color:#818cf8}
.tv-logo.espn   {border-color:#ef444450;color:#f87171}
.tv-logo.ziggo  {border-color:#f59e0b50;color:#fbbf24}
.tv-logo.prime  {border-color:#38bdf850;color:#38bdf8}
.tv-logo.npo    {border-color:#10b98150;color:#10b981}

/* Loading / empty */
.status-msg{padding:32px;text-align:center;color:var(--muted);font-size:13px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px}
.loading-bar{width:32px;height:2px;background:var(--champ);animation:load 1s ease-in-out infinite alternate;margin:0 auto 10px;border-radius:2px}
@keyframes load{from{width:20px;opacity:.4}to{width:80px;opacity:1}}

/* Footer */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px 16px;margin-top:32px}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--muted)}
.footer-logo span{color:var(--champ)}
.footer-links{display:flex;gap:16px}
.footer-links a{font-size:11px;color:var(--muted);text-decoration:none;font-family:'Inter',sans-serif}
.footer-links a:hover{color:var(--muted2)}
.footer-source{font-size:10px;color:var(--muted);font-family:'Inter',sans-serif}

@media(max-width:580px){
  .match-row{grid-template-columns:44px 1fr 80px}
  .main{padding:10px}
  .sec-filters,.legend,.stats-bar{padding-left:12px;padding-right:12px}
  .footer-inner{flex-direction:column;align-items:flex-start}
}
</style>
<script defer src="/speed-insights.js"></script>
</head>

const BADGE_LABELS = {
  champ:'Kampioenschap','cl-direct':'CL direct','cl-pre':'CL voorronde',
  'el-direct':'EL direct','el-pre':'EL voorronde',conf:'Conference',
  'rel-dir':'Degradatie','rel-po':'Play-off',mid:'',
};

const LEAGUE_KEYS = {
  'eredivisie':'ed','premier league':'pl','bundesliga':'bl',
  'la liga':'ll','serie a':'sa','ligue 1':'l1',
};

const LEAGUE_FLAGS = {ed:'🇳🇱',pl:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',bl:'🇩🇪',ll:'🇪🇸',sa:'🇮🇹',l1:'🇫🇷'};

const ALL_ZENDERS = ['Viaplay','Prime Video','ESPN','Ziggo Sport','NPO'];

function clubStake(leagueKey, rank) {
  const zones = STAKE_ZONES[leagueKey];
  if (!zones) return 'mid';
  const last = zones[zones.length-1];
  if (rank >= (last.rDir||last.total-1)) return 'rel-dir';
  if (rank >= (last.rPO||last.total-2))  return 'rel-po';
  for (const z of zones.slice(0,-1)) if (rank <= z.max) return z.key;
  return 'mid';
}

function resolveTV(leagueKey, day, time) {
  const map = {ed:{label:'ESPN',cls:'espn'},pl:{label:'Viaplay',cls:'viaplay'},bl:{label:'Viaplay',cls:'viaplay'},ll:{label:'Ziggo Sport',cls:'ziggo'},sa:{label:'Ziggo Sport',cls:'ziggo'},l1:{label:'Viaplay',cls:'viaplay'}};
  const base = map[leagueKey] || {label:'?',cls:''};
  if (leagueKey==='pl') {
    const isSat = /za\s|zaterdag/i.test(day);
    const h = parseInt(time);
    if (isSat && h>=13 && h<16) return {label:'Prime Video',cls:'prime'};
  }
  return base;
}

  {day:'Zo 12 apr',sk:'2026-04-12 16:45',time:'16:45',leagueKey:'ed',comp:'Eredivisie',home:'AZ',away:'sc Heerenveen'},
  {day:'Zo 12 apr',sk:'2026-04-12 20:45',time:'20:45',leagueKey:'l1',comp:'Ligue 1',home:'AS Monaco',away:'Olympique Marseille'},
  {day:'Ma 13 apr',sk:'2026-04-13 20:45',time:'20:45',leagueKey:'sa',comp:'Serie A',home:'SSC Napoli',away:'AC Milan'},
  {day:'Ma 13 apr',sk:'2026-04-13 21:00',time:'21:00',leagueKey:'pl',comp:'Premier League',home:'Manchester United',away:'Leeds United'},
  {day:'Ma 13 apr',sk:'2026-04-13 21:00',time:'21:00',leagueKey:'ll',comp:'La Liga',home:'Girona FC',away:'Villarreal CF'},
].map(m => enrichMatch(m));

function enrichMatch(m) {
  const s  = STANDINGS[m.leagueKey] || {};
  const rH = s[m.home] || 9, rA = s[m.away] || 9;
  return {
    ...m,
    rH, rA,
    flag: LEAGUE_FLAGS[m.leagueKey] || '🌍',
    tv:   resolveTV(m.leagueKey, m.day, m.time),
    stakeH: clubStake(m.leagueKey, rH),
    stakeA: clubStake(m.leagueKey, rA),
  };
}

// ── STATE ──
let MATCHES = [];
let activeLeague = 'all', activeLegend = null, activeTV = null;

// ── FILTERS ──
function filterLeague(v,btn){activeLeague=v;document.querySelectorAll('#league-filters .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function filterTV(v,btn){
  activeTV=activeTV===v?null:v;
  document.querySelectorAll('.sec-filters .tag-btn,.stat-block.zender').forEach(b=>b.classList.remove('active'));
  if(activeTV){btn.classList.add('active');document.querySelectorAll('.stat-block.zender').forEach(b=>{if(b.dataset.tv===activeTV)b.classList.add('active');});}
  render();
}
function filterZenderStat(v,el){
  activeTV=activeTV===v?null:v;
  document.querySelectorAll('.sec-filters .tag-btn,.stat-block.zender').forEach(b=>b.classList.remove('active'));
  if(activeTV){el.classList.add('active');document.querySelectorAll('.sec-filters .tag-btn').forEach(b=>{if(b.textContent.trim()===activeTV)b.classList.add('active');});}
  render();
}
function filterLegend(v,el){
  activeLegend=activeLegend===v?null:v;
  document.querySelectorAll('#legend .leg-item').forEach(b=>b.classList.remove('active'));
  if(activeLegend) el.classList.add('active');
  render();
}
function getFiltered(){
  return MATCHES.filter(m=>{
    if(activeLeague!=='all'&&m.leagueKey!==activeLeague) return false;
    if(activeLegend&&m.stakeH!==activeLegend&&m.stakeA!==activeLegend) return false;
    if(activeTV&&m.tv.label!==activeTV) return false;
    return true;
  });
}

// ── RENDER ──
function badgeHtml(key){
  const label=BADGE_LABELS[key];
  if(!label) return '';
  return `<span class="stake-badge b-${key}">${label}</span>`;
}

function renderStats(filtered){
  const total=filtered.length;
  const free=filtered.filter(m=>m.tv.free).length;
  const paid=total-free;
  const zC={};
  filtered.forEach(m=>{zC[m.tv.label]=(zC[m.tv.label]||0)+1;});
  let h=`<div class="stat-block"><div class="stat-label">Totaal</div><div class="stat-value">${total}</div></div>
    <div class="stat-block s-free"><div class="stat-label">Gratis</div><div class="stat-value">${free}</div></div>
    <div class="stat-block s-paid"><div class="stat-label">Betaald</div><div class="stat-value">${paid}</div></div>`;
  ALL_ZENDERS.forEach(z=>{
    const n=zC[z];if(!n)return;
    const ac=activeTV===z?'active':'';
    h+=`<div class="stat-block zender ${ac}" data-tv="${z}" onclick="filterZenderStat('${z}',this)"><div class="zender-name">${z}</div><div class="stat-value">${n}</div></div>`;
  });
  document.getElementById('stats-bar').innerHTML=h;
}

function render(){
  const filtered=getFiltered();
  renderStats(filtered);
  if(!filtered.length){
    document.getElementById('main-content').innerHTML='<div class="status-msg">Geen wedstrijden gevonden voor deze selectie.</div>';
    return;
  }
  const byDay={};
  const dayOrder=[];
  filtered.forEach(m=>{
    if(!byDay[m.day]){byDay[m.day]=[];dayOrder.push(m.day);}
    byDay[m.day].push(m);
  });
  let html='';
  dayOrder.forEach(day=>{
    const list=byDay[day];
    html+=`<div class="day-sep"><div class="day-name">${day}</div><div class="day-line"></div><div class="day-count2">${list.length}</div></div>`;
    list.forEach(m=>{
      html+=`<div class="match-row">
        <div class="m-time">${m.time}</div>
        <div class="m-teams">
          <div class="m-comp">${m.flag} ${m.comp}</div>
          <div class="team-line"><span class="team-rank">#${m.rH}</span><span class="team-name">${m.home}</span>${badgeHtml(m.stakeH)}</div>
          <div class="vs-row">vs</div>
          <div class="team-line"><span class="team-rank">#${m.rA}</span><span class="team-name">${m.away}</span>${badgeHtml(m.stakeA)}</div>
        </div>
        <div><div class="tv-logo ${m.tv.cls}">${m.tv.label}</div></div>
      </div>`;
    });
  });
  document.getElementById('main-content').innerHTML=html;
}

// ── LOAD DATA ──
async function loadMatches() {
  try {
    const res  = await fetch('/api/matches');
    const data = await res.json();
    if (data.matches && data.matches.length > 0) {
      MATCHES = data.matches
        .map(m => ({
          ...m,
          flag: LEAGUE_FLAGS[m.leagueKey] || '🌍',
          sk: m.sk || (m.day + ' ' + m.time),
        }))
        .sort((a,b) => (a.sk||'').localeCompare(b.sk||''));
      document.getElementById('fetch-status').textContent =
        `TV-data via iservoetbalvanavond.nl · ${new Date(data.fetched_at).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
    } else {
      throw new Error('empty');
    }
  } catch(e) {
    // Use fallback static data
    MATCHES = [...FALLBACK].sort((a,b)=>a.sk.localeCompare(b.sk));
    document.getElementById('fetch-status').textContent = 'TV-data: statische weergave (demo)';
  }
  render();
}

// ── INIT ──
document.getElementById('cur-date').textContent =
  new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
loadMatches();
</script>
